name: Update All Mihomo Rules (.mrs)

on:
  schedule:
    - cron: '0 22 * * *' # 北京时间 06:00
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Mihomo
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y jq gzip wget curl

          LATEST_VERSION=$(curl -s "https://api.github.com/repos/MetaCubeX/mihomo/releases/latest" | jq -r .tag_name)
          echo "Downloading Mihomo $LATEST_VERSION..."

          wget "https://github.com/MetaCubeX/mihomo/releases/download/$LATEST_VERSION/mihomo-linux-amd64-$LATEST_VERSION.gz" -O mihomo.gz
          gzip -d mihomo.gz
          chmod +x mihomo
          ./mihomo -v

      - name: Convert Upstream Domain/IP Rules
        run: |
          set -e

          git clone --depth 1 https://github.com/Accademia/Additional_Rule_For_Clash.git upstream

          rm -rf rules
          mkdir -p rules

          find upstream -type f \( -name "*_Domain.yaml" -o -name "*_IP.yaml" \) | while read source_file; do
            rel_path=${source_file#upstream/}
            dir_name=$(dirname "$rel_path")
            base_name=$(basename "$source_file" .yaml)

            target_dir="rules/$dir_name"
            mkdir -p "$target_dir"

            if [[ "$base_name" == *_Domain ]]; then
              rule_type="domain"
            elif [[ "$base_name" == *_IP ]]; then
              rule_type="ipcidr"
            else
              echo "⏭️ Skip unsupported file: $rel_path"
              continue
            fi

            target_file="$target_dir/$base_name.mrs"

            echo "🔄 Converting: $rel_path -> $target_file (Type: $rule_type)"
            ./mihomo convert-ruleset "$rule_type" yaml "$source_file" "$target_file"

            if [[ ! -s "$target_file" ]]; then
              echo "❌ Empty mrs generated: $target_file"
              exit 1
            fi
          done

      - name: Convert Google Voice self ruleset
        run: |
          set -e

          SELF_DIR="self/google"
          mkdir -p "$SELF_DIR"

          SRC_URL="https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/GoogleVoice/GoogleVoice.list"

          RAW_FILE="$SELF_DIR/GoogleVoice.raw"

          DOMAIN_FILE="$SELF_DIR/GoogleVoice_Domain.list"
          IP_FILE="$SELF_DIR/GoogleVoice_IP.list"

          DOMAIN_MRS="$SELF_DIR/GoogleVoice_Domain.mrs"
          IP_MRS="$SELF_DIR/GoogleVoice_IP.mrs"

          echo "⬇️ Downloading Google Voice rule..."
          curl -fsSL "$SRC_URL" -o "$RAW_FILE"

          echo "📄 Source preview:"
          head -n 30 "$RAW_FILE"

          echo "🧹 Extracting domain rules..."

          grep -E '^[[:space:]]*(-[[:space:]]*)?(DOMAIN|DOMAIN-SUFFIX|DOMAIN-KEYWORD),' "$RAW_FILE" \
            | sed 's/^[[:space:]]*-[[:space:]]*//' \
            | sed 's/\r$//' \
            | sed 's/[[:space:]]//g' \
            | sort -u > "$DOMAIN_FILE" || true

          echo "🧹 Extracting ip rules..."

          grep -E '^[[:space:]]*(-[[:space:]]*)?(IP-CIDR|IP-CIDR6),' "$RAW_FILE" \
            | sed 's/^[[:space:]]*-[[:space:]]*//' \
            | sed 's/\r$//' \
            | sed 's/[[:space:]]//g' \
            | sort -u > "$IP_FILE" || true

          DOMAIN_COUNT=$(wc -l < "$DOMAIN_FILE" | tr -d ' ')
          IP_COUNT=$(wc -l < "$IP_FILE" | tr -d ' ')

          echo "📊 Domain rule count: $DOMAIN_COUNT"
          echo "📊 IP rule count: $IP_COUNT"

          rm -f "$DOMAIN_MRS" "$IP_MRS"
          rm -f "$SELF_DIR/GoogleVoice.mrs"

          if [ "$DOMAIN_COUNT" -gt 0 ]; then
            echo "🔄 Converting domain rules to mrs..."
            ./mihomo convert-ruleset domain text "$DOMAIN_FILE" "$DOMAIN_MRS"

            if [ ! -s "$DOMAIN_MRS" ]; then
              echo "❌ GoogleVoice_Domain.mrs is empty"
              exit 1
            fi

            echo "✅ Domain mrs generated:"
            ls -lh "$DOMAIN_MRS"
          else
            echo "⚠️ No domain rules found. Skipping domain mrs."
          fi

          if [ "$IP_COUNT" -gt 0 ]; then
            echo "🔄 Converting ip rules to mrs..."
            ./mihomo convert-ruleset ipcidr text "$IP_FILE" "$IP_MRS"

            if [ ! -s "$IP_MRS" ]; then
              echo "❌ GoogleVoice_IP.mrs is empty"
              exit 1
            fi

            echo "✅ IP mrs generated:"
            ls -lh "$IP_MRS"
          else
            echo "⚠️ No ip rules found. Skipping ip mrs."
          fi

          rm -f "$RAW_FILE" "$DOMAIN_FILE" "$IP_FILE"

      - name: Cleanup
        run: |
          rm -f mihomo
          rm -rf upstream

      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add rules self

          if git diff --staged --quiet; then
            echo "⚠️ No changes detected. Skipping commit."
            exit 0
          else
            echo "✅ Changes detected. Committing..."
            git commit -m "Auto-update mrs rules: $(date +'%Y-%m-%d')"
            git push
          fi
