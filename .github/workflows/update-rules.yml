name: Update All Mihomo Rules (.mrs)

on:
  schedule:
    - cron: '0 22 * * *' # 北京时间 06:00
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Mihomo
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y jq gzip wget curl golang-go python3

          echo "🔎 Fetching latest Mihomo release info..."

          RELEASE_JSON=$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "User-Agent: github-actions" \
            "https://api.github.com/repos/MetaCubeX/mihomo/releases/latest")

          LATEST_VERSION=$(echo "$RELEASE_JSON" | jq -r '.tag_name // empty')

          if [ -z "$LATEST_VERSION" ] || [ "$LATEST_VERSION" = "null" ]; then
            echo "❌ Failed to get Mihomo latest version."
            echo "📄 GitHub API response:"
            echo "$RELEASE_JSON"
            exit 1
          fi

          echo "✅ Latest Mihomo version: $LATEST_VERSION"

          ASSET_URL=$(echo "$RELEASE_JSON" | jq -r '
            .assets[]
            | select(.name | test("^mihomo-linux-amd64-.*\\.gz$"))
            | .browser_download_url
          ' | head -n 1)

          if [ -z "$ASSET_URL" ] || [ "$ASSET_URL" = "null" ]; then
            echo "❌ Failed to find linux amd64 mihomo asset."
            echo "📦 Available assets:"
            echo "$RELEASE_JSON" | jq -r '.assets[].name'
            exit 1
          fi

          echo "⬇️ Downloading Mihomo from:"
          echo "$ASSET_URL"

          curl -fL "$ASSET_URL" -o mihomo.gz

          gzip -d mihomo.gz
          chmod +x mihomo
          ./mihomo -v

      - name: Setup v2dat
        run: |
          set -e

          echo "🔧 Installing v2dat..."
          go install github.com/urlesistiana/v2dat@latest

          cp ~/go/bin/v2dat ./v2dat
          chmod +x ./v2dat

          ./v2dat --help || true

      - name: Convert Upstream Domain/IP Rules
        run: |
          set -e

          git clone --depth 1 https://github.com/Accademia/Additional_Rule_For_Clash.git upstream

          rm -rf rules self
          mkdir -p rules

          find upstream -type f \( -name "*_Domain.yaml" -o -name "*_IP.yaml" \) | while read source_file; do
            rel_path=${source_file#upstream/}
            dir_name=$(dirname "$rel_path")
            base_name=$(basename "$source_file" .yaml)

            target_dir="rules/$dir_name"
            mkdir -p "$target_dir"

            if [[ "$base_name" == *_Domain ]]; then
              rule_type="domain"
            elif [[ "$base_name" == *_IP ]]; then
              rule_type="ipcidr"
            else
              echo "⏭️ Skip unsupported file: $rel_path"
              continue
            fi

            target_file="$target_dir/$base_name.mrs"

            echo "🔄 Converting: $rel_path -> $target_file (Type: $rule_type)"
            ./mihomo convert-ruleset "$rule_type" yaml "$source_file" "$target_file"

            if [[ ! -s "$target_file" ]]; then
              echo "❌ Empty mrs generated: $target_file"
              exit 1
            fi
          done

      - name: Convert Geosite Porn Rules
        run: |
          set -e

          SELF_DIR="self/porn"
          WORK_DIR="tmp-geosite"

          mkdir -p "$SELF_DIR" "$WORK_DIR"

          GEOSITE_DAT="$WORK_DIR/geosite.dat"
          RAW_TXT_FILE="$WORK_DIR/raw_path.txt"
          CLEAN_FILE="$WORK_DIR/Porn_Domain.list"
          TARGET_FILE="$SELF_DIR/Porn_Domain.mrs"

          echo "⬇️ Downloading latest geosite.dat from Loyalsoldier..."
          curl -fsSL "https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat" -o "$GEOSITE_DAT"

          echo "📦 Unpacking geosite:category-porn..."
          ./v2dat unpack geosite -o "$WORK_DIR" -f category-porn "$GEOSITE_DAT"

          echo "📂 Files in work dir:"
          find "$WORK_DIR" -maxdepth 2 -type f -print

          RAW_TXT=$(find "$WORK_DIR" -type f -name "*category-porn*.txt" | head -n 1)

          if [ -z "$RAW_TXT" ]; then
            echo "❌ category-porn txt file not found"
            echo "📂 Current files:"
            find "$WORK_DIR" -maxdepth 2 -type f -print
            exit 1
          fi

          echo "$RAW_TXT" > "$RAW_TXT_FILE"

          echo "✅ Found raw file: $RAW_TXT"

          echo "📄 Raw geosite:category-porn preview:"
          head -n 30 "$RAW_TXT"

          echo "🧹 Converting geosite text to Mihomo domain text format..."

          export RAW_TXT
          export CLEAN_FILE

          python3 << 'PY'
import os
import re
from pathlib import Path
from itertools import product

raw_txt = Path(os.environ["RAW_TXT"])
clean_file = Path(os.environ["CLEAN_FILE"])

rules = []
skipped_regexp = []
expanded_regexp_count = 0

def add_rule(rule_type, value):
    value = value.strip().lower()

    if not value:
        return

    # 去掉可能出现的多余点
    value = value.strip(".")

    # 避免把带冒号的错误内容写进去，比如 domain:example.com
    if ":" in value:
        return

    # 简单过滤明显不是域名/关键词的内容
    if rule_type != "DOMAIN-KEYWORD" and "." not in value:
        return

    rules.append(f"{rule_type},{value}")

def expand_simple_regex(pattern, max_expand=10000):
    """
    尽量把简单 regexp 展开成具体域名。
    支持：
    1. (^|.) 前缀
    2. $ 后缀
    3. (com|net|org) 这种简单分组
    4. [0-9] / [1-9] / [a-z] 这种单字符范围
    5. 固定 {2} / {3} 小数量重复

    遇到 +、*、?、{0,5}、{1,3} 这类不适合有限展开的规则会跳过。
    """

    p = pattern.strip()

    if p.startswith("regexp:"):
        p = p[len("regexp:"):]

    # 去掉常见开头：(^|.) 或 (^|\.)
    p = re.sub(r'^\(\^\|\\?\.\)', '', p)
    p = re.sub(r'^\(\^\|\.\)', '', p)

    # 去掉结尾 $
    if p.endswith("$"):
        p = p[:-1]

    # 把 \. 当成普通点
    p = p.replace(r"\.", ".")

    # 这些通常代表无限或过宽匹配，不展开
    if "+" in p or "*" in p:
        return None

    # {0,5}、{1,3} 这类数量范围可能爆炸，先不展开
    if re.search(r'\{\d+,\d*\}', p):
        return None

    # ? 可选项会让解析复杂，先不展开，避免误生成
    if "?" in p:
        return None

    tokens = []
    i = 0

    while i < len(p):
        ch = p[i]

        # 分组，例如 (com|net|org)
        if ch == "(":
            j = p.find(")", i)
            if j == -1:
                return None

            group = p[i + 1:j]
            parts = group.split("|")

            if not parts or any(not x for x in parts):
                return None

            # 避免嵌套复杂表达式
            if any(any(c in x for c in "()[]{}+*?\\^$") for x in parts):
                return None

            tokens.append(parts)
            i = j + 1
            continue

        # 字符范围，例如 [0-9]、[1-9]、[a-z]
        if ch == "[":
            j = p.find("]", i)
            if j == -1:
                return None

            body = p[i + 1:j]
            chars = []

            if body == "0-9":
                chars = list("0123456789")
            elif body == "1-9":
                chars = list("123456789")
            elif body == "a-z":
                chars = list("abcdefghijklmnopqrstuvwxyz")
            elif body == "A-Z":
                chars = list("abcdefghijklmnopqrstuvwxyz")
            elif re.fullmatch(r'[0-9a-zA-Z]+', body):
                chars = list(body.lower())
            else:
                return None

            i = j + 1

            # 支持固定重复，例如 [0-9]{2}
            repeat = 1
            m = re.match(r'\{(\d+)\}', p[i:])
            if m:
                repeat = int(m.group(1))
                i += len(m.group(0))

            if repeat > 4:
                return None

            for _ in range(repeat):
                tokens.append(chars)

            continue

        # 普通字符
        if ch in "^$":
            i += 1
            continue

        # 单独出现这些字符，说明复杂度超出简单展开范围
        if ch in "{}|+*?\\":
            return None

        tokens.append([ch.lower()])
        i += 1

    total = 1
    for t in tokens:
        total *= len(t)
        if total > max_expand:
            return None

    results = ["".join(x) for x in product(*tokens)]

    # 简单过滤
    results = [
        x.strip(".").lower()
        for x in results
        if "." in x and not any(c in x for c in "()[]{}|\\^$")
    ]

    return results or None

for raw_line in raw_txt.read_text(encoding="utf-8", errors="ignore").splitlines():
    line = raw_line.strip().replace("\r", "")

    if not line:
        continue

    if line.startswith("domain:"):
        add_rule("DOMAIN-SUFFIX", line[len("domain:"):])

    elif line.startswith("full:"):
        add_rule("DOMAIN", line[len("full:"):])

    elif line.startswith("keyword:"):
        add_rule("DOMAIN-KEYWORD", line[len("keyword:"):])

    elif line.startswith("regexp:"):
        expanded = expand_simple_regex(line)

        if expanded:
            expanded_regexp_count += len(expanded)
            for domain in expanded:
                add_rule("DOMAIN-SUFFIX", domain)
        else:
            skipped_regexp.append(line)

    elif line.startswith("include:"):
        continue

    else:
        add_rule("DOMAIN-SUFFIX", line)

rules = sorted(set(rules))

clean_file.write_text("\n".join(rules) + "\n", encoding="utf-8")

print(f"📊 Expanded regexp domain count: {expanded_regexp_count}")
print(f"⚠️ Skipped regexp count: {len(skipped_regexp)}")

if skipped_regexp:
    print("⚠️ Skipped regexp preview:")
    for item in skipped_regexp[:50]:
        print(item)
PY

          sort -u -o "$CLEAN_FILE" "$CLEAN_FILE"

          COUNT=$(wc -l < "$CLEAN_FILE" | tr -d ' ')
          echo "📊 Porn domain rule count: $COUNT"

          if [ "$COUNT" -le 0 ]; then
            echo "❌ No valid porn domain rules found"
            exit 1
          fi

          echo "📄 Clean Mihomo rule preview:"
          head -n 50 "$CLEAN_FILE"

          echo "🔎 Checking for wrong domain prefix:"
          if grep -q 'DOMAIN-SUFFIX,domain:' "$CLEAN_FILE"; then
            echo "❌ Found invalid DOMAIN-SUFFIX,domain:* rules"
            grep 'DOMAIN-SUFFIX,domain:' "$CLEAN_FILE" | head
            exit 1
          fi

          echo "🔎 Checking for other wrong prefixes:"
          grep -n '^DOMAIN-SUFFIX,full:' "$CLEAN_FILE" | head || true
          grep -n '^DOMAIN-SUFFIX,keyword:' "$CLEAN_FILE" | head || true
          grep -n '^DOMAIN-SUFFIX,regexp:' "$CLEAN_FILE" | head || true

          echo "📄 Saving readable list..."
          cp "$CLEAN_FILE" "$SELF_DIR/Porn_Domain.list"

          echo "🔄 Converting Porn_Domain.list to Porn_Domain.mrs..."
          ./mihomo convert-ruleset domain text "$CLEAN_FILE" "$TARGET_FILE"

          if [[ ! -s "$TARGET_FILE" ]]; then
            echo "❌ Porn_Domain.mrs is empty"
            exit 1
          fi

          echo "✅ Porn_Domain.mrs generated:"
          ls -lh "$TARGET_FILE"

          rm -rf "$WORK_DIR"

      - name: Cleanup
        run: |
          rm -f mihomo v2dat
          rm -rf upstream tmp-geosite

      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A rules self

          if git diff --staged --quiet; then
            echo "⚠️ No changes detected. Skipping commit."
            exit 0
          else
            echo "✅ Changes detected. Committing..."
            git commit -m "Auto-update mrs rules: $(date +'%Y-%m-%d')"
            git push
          fi
