name: Update All Mihomo Rules (.mrs)

on:
  schedule:
    - cron: '0 22 * * *' # 北京时间 06:00
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y jq gzip wget curl golang-go python3 coreutils

      - name: Setup Mihomo
        run: |
          set -e

          echo "🔎 Fetching latest Mihomo release info..."

          RELEASE_JSON=$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "User-Agent: github-actions" \
            "https://api.github.com/repos/MetaCubeX/mihomo/releases/latest")

          LATEST_VERSION=$(echo "$RELEASE_JSON" | jq -r '.tag_name // empty')

          if [ -z "$LATEST_VERSION" ] || [ "$LATEST_VERSION" = "null" ]; then
            echo "❌ Failed to get Mihomo latest version."
            echo "📄 GitHub API response:"
            echo "$RELEASE_JSON"
            exit 1
          fi

          echo "✅ Latest Mihomo version: $LATEST_VERSION"

          ASSET_URL=$(echo "$RELEASE_JSON" | jq -r '
            .assets[]
            | select(.name | test("^mihomo-linux-amd64-.*\\.gz$"))
            | .browser_download_url
          ' | head -n 1)

          if [ -z "$ASSET_URL" ] || [ "$ASSET_URL" = "null" ]; then
            echo "❌ Failed to find linux amd64 mihomo asset."
            echo "📦 Available assets:"
            echo "$RELEASE_JSON" | jq -r '.assets[].name'
            exit 1
          fi

          echo "⬇️ Downloading Mihomo from:"
          echo "$ASSET_URL"

          curl -fL "$ASSET_URL" -o mihomo.gz
          gzip -d mihomo.gz
          chmod +x mihomo
          ./mihomo -v

      - name: Setup v2dat
        run: |
          set -e

          echo "🔧 Installing v2dat..."
          go install github.com/urlesistiana/v2dat@latest

          cp ~/go/bin/v2dat ./v2dat
          chmod +x ./v2dat

          ./v2dat --help || true

      - name: Convert Upstream Domain/IP Rules
        run: |
          set -e

          git clone --depth 1 https://github.com/Accademia/Additional_Rule_For_Clash.git upstream

          rm -rf rules self
          mkdir -p rules

          find upstream -type f -name "*.yaml" | while read source_file; do
            rel_path=${source_file#upstream/}
            dir_name=$(dirname "$rel_path")
            base_name=$(basename "$source_file" .yaml)

            target_dir="rules/$dir_name"
            mkdir -p "$target_dir"

            domain_list=$(mktemp)
            ip_list=$(mktemp)

            echo "🔍 Parsing: $rel_path"

            awk '
              function trim(s) {
                gsub(/^[ \t]+|[ \t]+$/, "", s)
                return s
              }

              {
                line=$0
                gsub(/\r/, "", line)

                # remove yaml list prefix
                sub(/^[ \t]*-[ \t]*/, "", line)

                # remove inline comments
                sub(/[ \t]*#.*/, "", line)

                # normalize spaces around commas
                gsub(/[ \t]*,[ \t]*/, ",", line)

                split(line, arr, ",")
                type=trim(arr[1])
                value=trim(arr[2])

                if (value == "") next

                if (type == "DOMAIN") {
                  print value
                } else if (type == "DOMAIN-SUFFIX") {
                  print "+." value
                } else if (type == "DOMAIN-KEYWORD") {
                  print "*" value "*"
                }
              }
            ' "$source_file" | sort -u > "$domain_list"

            awk '
              function trim(s) {
                gsub(/^[ \t]+|[ \t]+$/, "", s)
                return s
              }

              {
                line=$0
                gsub(/\r/, "", line)

                # remove yaml list prefix
                sub(/^[ \t]*-[ \t]*/, "", line)

                # remove inline comments
                sub(/[ \t]*#.*/, "", line)

                # normalize spaces around commas
                gsub(/[ \t]*,[ \t]*/, ",", line)

                split(line, arr, ",")
                type=trim(arr[1])
                value=trim(arr[2])

                if (value == "") next

                if (type == "IP-CIDR" || type == "IP-CIDR6") {
                  print value
                }
              }
            ' "$source_file" | sort -u > "$ip_list"

            domain_count=$(wc -l < "$domain_list" | tr -d ' ')
            ip_count=$(wc -l < "$ip_list" | tr -d ' ')

            echo "📊 Domain count: $domain_count"
            echo "📊 IP count: $ip_count"

            if [ "$domain_count" -gt 0 ]; then
              if [[ "$base_name" == *_Domain ]]; then
                domain_target="$target_dir/$base_name.mrs"
              else
                domain_target="$target_dir/${base_name}_Domain.mrs"
              fi

              echo "🔄 Converting domain rules: $rel_path -> $domain_target"
              ./mihomo convert-ruleset domain text "$domain_list" "$domain_target"

              if [[ ! -s "$domain_target" ]]; then
                echo "❌ Empty domain mrs generated: $domain_target"
                exit 1
              fi
            else
              echo "⚠️ No domain rules found in $rel_path"
            fi

            if [ "$ip_count" -gt 0 ]; then
              if [[ "$base_name" == *_IP ]]; then
                ip_target="$target_dir/$base_name.mrs"
              else
                ip_target="$target_dir/${base_name}_IP.mrs"
              fi

              echo "🔄 Converting IP rules: $rel_path -> $ip_target"
              ./mihomo convert-ruleset ipcidr text "$ip_list" "$ip_target"

              if [[ ! -s "$ip_target" ]]; then
                echo "❌ Empty ip mrs generated: $ip_target"
                exit 1
              fi
            else
              echo "⚠️ No IP rules found in $rel_path"
            fi

            rm -f "$domain_list" "$ip_list"
          done

